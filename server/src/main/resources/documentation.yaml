openapi: "3.0.0"
info:
  title: "API de Futebol FATEC"
  description: "Gerenciamento completo de Times e Jogadores (CRUD). Use o botão 'Try it out' para testar as rotas."
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"

paths:
  # --- TIMES ---
  /times:
    get:
      summary: "Lista todos os times"
      responses:
        '200':
          description: "Lista de times cadastrados"
          content:
            text/plain:
              example: "ID: 1 | Nome: Santos | Estadio: Vila | Cidade: Santos"
    post:
      summary: "Cadastra um novo time"
      parameters:
        - name: nome
          in: query
          required: true
          schema: { type: string, example: "Barcelona" }
        - name: estadio
          in: query
          required: true
          schema: { type: string, example: "Camp Nou" }
        - name: cidade
          in: query
          required: true
          schema: { type: string, example: "Catalunha" }
      responses:
        '201':
          description: "Time criado com sucesso"

  /times/{id}:
    put:
      summary: "Atualiza um time"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
        - name: nome
          in: query
          schema: { type: string, example: "Barcelona Atualizado" }
        - name: estadio
          in: query
          schema: { type: string, example: "Spotify Camp Nou" }
        - name: cidade
          in: query
          schema: { type: string, example: "Barcelona" }
      responses:
        '200':
          description: "Time atualizado"
    delete:
      summary: "Remove um time"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: "Time removido"

  # --- JOGADORES ---
  /jogadores:
    get:
      summary: "Lista todos os jogadores"
      responses:
        '200':
          description: "Lista de jogadores retornada"
          content:
            text/plain:
              example: "ID: 1 | Nome: Neymar | Posicao: Atacante | TimeID: 1"
    post:
      summary: "Cadastra um novo jogador"
      parameters:
        - name: nome
          in: query
          required: true
          schema: { type: string, example: "Pelé" }
        - name: posicao
          in: query
          required: true
          schema: { type: string, example: "Atacante" }
        - name: teamId
          in: query
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '201':
          description: "Jogador criado"

  /jogadores/{id}:
    put:
      summary: "Atualiza um jogador"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
        - name: nome
          in: query
          schema: { type: string, example: "Pelé" }
        - name: posicao
          in: query
          schema: { type: string, example: "Rei do Futebol" }
      responses:
        '200':
          description: "Jogador atualizado"
    delete:
      summary: "Remove um jogador"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: "Jogador removido"